                for (let i = 0; i < this._values.length; ++i) {
                    if (this._rec[i]) {
                        // don't handle key if it was already recorded
                        continue;
                    }
                    value.clear();
                    for (let k = 0; k < acc.length; ++k) {
                        value.add(this._values[i][acc[k]]);
                    }
                    if (value.size > 1) {
                        values.push({ code: this._codeAcc[i], keys: [...value] });
                    }
                }
                values.sort((a, b) => b.keys.length - a.keys.length);
                return { layouts: cands, keys: values };
            }
        }



        const ld = new Detector(KEYMAPS);
        const ld2 = new Detector(KEYMAPS);
        const ld3 = new Detector(KEYMAPS);
        const ld4 = new Detector(KEYMAPS);
        const ld5 = new Detector(KEYMAPS);


        const silent = [
            'Escape',
            'Backspace',
            'Tab',
            'Enter',
            'CapsLock',
            'ShiftLeft', 'ShiftRight',
            'ControlLeft', 'ControlRight',
            'MetaLeft', 'MetaRight',
            'AltLeft', 'AltRight',
            'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12',
        ];
        const modifier = [
            'CapsLock',
            'ShiftLeft', 'ShiftRight',
            'ControlLeft', 'ControlRight',
            'MetaLeft', 'MetaRight',
            'AltLeft', 'AltRight',
        ];
        const prevent = ['Tab', 'MetaLeft', 'Alt', 'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12'];
        const rename = { 'Escape': 'Esc', 'CapsLock': 'CapsL' };



        const inp = document.querySelector('#keyinput');
        const eLayouts = document.querySelector('#layouts');
        const eInstruction = document.querySelector('#instruction');
        inp.focus();
        let current_code = '';
        let err = false;
        const data = {};
        let cl_hold = false;
        let dead_code = '';
        let wasDead = false;
        let charProduced = false;

        function getClState(ev) {
            if (ev.code !== 'CapsLock') {
                cl_hold = ev.getModifierState('CapsLock');
                return cl_hold;
            }
            if (ev.type === 'keydown' && ev.code === 'CapsLock') {
                cl_hold = !cl_hold;
                return true;
            }
            return cl_hold;
        }

        function createSpan(code, value) {
            const el = document.createElement('span');
            el.innerText = rename[value] ?? value;
            el.id = code;
            el.style.boxShadow = 'inset black 1px 1px 1px';
            inp.parentNode.insertBefore(el, inp);
        }

        function showMsg(s) {
            //const el = document.querySelector('#msg');
            //el.innerText = s;
            //el.style.display = 'block';
        }

        function hideMsg() {
            //const el = document.querySelector('#msg');
            //el.style.display = 'none';
        }

        inp.addEventListener('keyup', ev => {
            console.log('up', ev);
            const cl_state = getClState(ev);
            if (charProduced) {
                hideMsg();
                dead_code = '';
            }
            if (ev.key === 'Dead' && ev.code !== current_code) {
                showMsg('Dead key found, press same key again.');
                dead_code = ev.code;
                current_code = ev.code;
            }
        });

        inp.addEventListener('keydown', ev => {
            console.log('down', ev);
            hideMsg();
            charProduced = false;
            const cl_state = getClState(ev);
            if ((ev.code === 'Unidentified' || ev.code === '')) {
                if (dead_code) {
                    current_code = dead_code;
                    return;
                };
                err = true;
                ev.preventDefault();
                ev.stopImmediatePropagation();
                showMsg('Unidentified key found.');
                return;
            }
            if (ev.code === 'Escape') {
                inp.previousSibling?.remove();
            }
            if (prevent.includes(ev.code)) {
                ev.preventDefault();
                ev.stopImmediatePropagation();
                ev.stopPropagation();
            }
            if (current_code == 'CapsLock' && ev.code == 'CapsLock') {
                return;
            }
            if (!modifier.includes(ev.code)) {
                if (ev.shiftKey || ev.altKey || ev.ctrlKey || ev.getModifierState('CapsLock') || ev.getModifierState('AltGraph')) {
                    showMsg('Disable modifier keys.');
                    err = true;
                    return;
                }
            }
            if (dead_code) {
                if (ev.code !== dead_code) {
                    showMsg('Dead key found, press same key again.');
                    err = true;
                    return;
                }
                dead_code = '';
            }
            if (ev.key === 'Dead' && ev.code !== current_code) {
                showMsg('Dead key found, press same key again.');
                dead_code = ev.code;
                wasDead = true;
            }
            err = false;
            current_code = ev.code;
            if (ev.code === 'Enter') {
                return;
            }
        });

        const key2dead = {
            "`": 768, "´": 769, "^": 770, "~": 771,
            "¯": 772, "˙": 775, "¨": 776, "°": 778,
            "ˇ": 780, "¸": 807, "ͺ": 837
        };

        inp.addEventListener('input', ev => {
            console.log('input', ev);
            if (!ev.target.value || err) {
                ev.target.value = '';
                return;
            }
            charProduced = true;
            data[current_code] = ev.target.value;
            let key = ev.target.value;
            if (((wasDead && !dead_code) || dead_code) && key2dead[key]) {
                key = String.fromCharCode(key2dead[key]);
            }
            console.log('wasDead', [key, wasDead, dead_code]);
            ld.feed(current_code, key);
            wasDead = false;
            ev.target.value = '';
            resolveInstructions();
        });

        function resolveInstructions() {
            const res = ld.resolve();
            console.log(res);
            eLayouts.innerHTML = `${res.layouts.length} layouts: <ul><li>${res.layouts.join('</li><li>')}</li></ul>`;
            if (res.layouts.length > 1) {
                const code = res.keys[0].code;
                const keys = res.keys[0].keys;
                eInstruction.innerText = `Press the ${code} key - typical symbols are\n: ${keys.join(' \xa0 ')}`;
            } else {
                eInstruction.innerText = `your layout is: ${res.layouts[0]}`;
            }
        }
        resolveInstructions();

    </script>
